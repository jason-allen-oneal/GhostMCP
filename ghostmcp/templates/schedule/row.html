<div class="bg-white p-4 rounded-lg shadow" id="schedule-{{ schedule.id }}">
    <div class="font-medium">{{ schedule.tool_name }}</div>
    <div class="text-sm text-gray-600">{{ schedule.target }}</div>
    <div class="text-sm">Cron: <code>{{ schedule.cron_expression }}</code></div>
    <div class="text-sm">Next run: {{ schedule.next_run_at }}</div>
</div>
