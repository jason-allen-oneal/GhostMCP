name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all
jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write

    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install release tooling
        run: |
          pip install --require-hashes -r requirements-release.lock.txt

      - name: Build release artifacts
        run: python -m build

      - name: Verify artifacts
        run: twine check dist/*

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.spdx.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.spdx.json

      - name: Publish to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_API_TOKEN }}
        run: twine upload dist/*.whl dist/*.tar.gz
