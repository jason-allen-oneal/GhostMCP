{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">Schedule Recurring Scan</h2>

    <form hx-post="/engagements/{{ engagement.id }}/schedule" hx-target="#schedule-list" hx-swap="beforeend" class="bg-white p-6 rounded-lg shadow space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tool</label>
            <select name="tool_name" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                {% for tool in tools %}
                <option value="{{ tool }}">{{ tool }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Target</label>
            <input type="text" name="target" required placeholder="example.com or 192.168.1.1" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cron Expression</label>
            <input type="text" name="cron_expression" required placeholder="0 2 * * * (daily at 2 AM)" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-sm text-gray-500 mt-1">Standard cron format: minute hour day month weekday</p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Parameters (JSON)</label>
            <textarea name="parameters" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" placeholder='{"wordlist": "/usr/share/wordlists/dirb/common.txt"}'>{}</textarea>
        </div>

        <div class="flex justify-end space-x-3 pt-4">
            <a href="/engagements/{{ engagement.id }}" class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50">Cancel</a>
            <button type="submit" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">Schedule Scan</button>
        </div>
    </form>

    <div id="schedule-list" class="hidden"></div>
</div>
{% endblock %}
