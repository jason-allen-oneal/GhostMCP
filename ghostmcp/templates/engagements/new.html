{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">New Engagement</h2>

    <form hx-post="/engagements" hx-target="#engagement-list" hx-swap="beforeend" class="bg-white p-6 rounded-lg shadow space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Scope CIDRs (comma-separated)</label>
            <input type="text" name="scope_cidrs" placeholder="10.0.0.0/8, 192.168.1.0/24" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Scope Domains (comma-separated)</label>
            <input type="text" name="scope_domains" placeholder="example.com, test.example.com" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Max Tool Level</label>
            <select name="max_tool_level" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="passive">Passive</option>
                <option value="active">Active</option>
                <option value="intrusive" selected>Intrusive</option>
            </select>
        </div>

        <div class="flex justify-end space-x-3 pt-4">
            <a href="/engagements" class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50">Cancel</a>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Create Engagement</button>
        </div>
    </form>

    <div id="engagement-list" class="hidden"></div>
</div>
{% endblock %}
