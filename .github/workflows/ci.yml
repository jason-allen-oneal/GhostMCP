name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lint and lock tooling
        run: python -m pip install ruff pip-tools

      - name: Collect lint result
        id: lint
        shell: bash
        run: |
          set +e
          ruff check . --output-format=concise > ruff-output.txt 2>&1
          status=$?
          cat ruff-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload lint diagnostics
        if: steps.lint.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-py${{ matrix.python-version }}
          path: ruff-output.txt

      - name: Enforce lint result
        if: steps.lint.outputs.status != '0'
        run: exit 1

      - name: Generate development lock file
        run: >-
          pip-compile --generate-hashes
          --output-file=requirements-dev.lock.txt
          pyproject.toml --extra dev --extra dashboard --extra credentials

      - name: Generate runtime lock file
        run: >-
          pip-compile --generate-hashes
          --output-file=requirements.lock.txt
          pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock.txt
          python -m pip install -e . --no-deps

      - name: Collect type-check result
        id: mypy
        shell: bash
        run: |
          set +e
          mypy ghostmcp > mypy-output.txt 2>&1
          status=$?
          cat mypy-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload type-check diagnostics
        if: steps.mypy.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mypy-py${{ matrix.python-version }}
          path: mypy-output.txt

      - name: Enforce type-check result
        if: steps.mypy.outputs.status != '0'
        run: exit 1

      - name: Collect static-security result
        id: bandit
        shell: bash
        run: |
          set +e
          bandit -q -r ghostmcp > bandit-output.txt 2>&1
          status=$?
          cat bandit-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload static-security diagnostics
        if: steps.bandit.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bandit-py${{ matrix.python-version }}
          path: bandit-output.txt

      - name: Enforce static-security result
        if: steps.bandit.outputs.status != '0'
        run: exit 1

      - name: Collect dependency-audit result
        id: audit
        shell: bash
        run: |
          set +e
          pip-audit > pip-audit-output.txt 2>&1
          status=$?
          cat pip-audit-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload dependency-audit diagnostics
        if: steps.audit.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-py${{ matrix.python-version }}
          path: pip-audit-output.txt

      - name: Enforce dependency-audit result
        if: steps.audit.outputs.status != '0'
        run: exit 1

      - name: Collect test result
        id: tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > test-output.txt 2>&1
          status=$?
          cat test-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test diagnostics
        if: steps.tests.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tests-py${{ matrix.python-version }}
          path: test-output.txt

      - name: Enforce test result
        if: steps.tests.outputs.status != '0'
        run: exit 1

      - name: Build package artifacts
        run: python -m build

      - name: Collect wheel smoke-test result
        id: wheel
        shell: bash
        run: |
          set +e
          {
            python -m venv /tmp/ghostmcp-wheel-smoke
            /tmp/ghostmcp-wheel-smoke/bin/python -m pip install --upgrade pip
            /tmp/ghostmcp-wheel-smoke/bin/python -m pip install dist/*.whl jinja2 python-multipart cryptography
            /tmp/ghostmcp-wheel-smoke/bin/python - <<'PY'
          from importlib.resources import files
          import ghostmcp.parsers.nmap
          import ghostmcp.dashboard
          assert files("ghostmcp").joinpath("templates/dashboard.html").is_file()
          PY
            /tmp/ghostmcp-wheel-smoke/bin/ghostmcp --version
          } > wheel-output.txt 2>&1
          status=$?
          cat wheel-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload wheel smoke-test diagnostics
        if: steps.wheel.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-py${{ matrix.python-version }}
          path: wheel-output.txt

      - name: Enforce wheel smoke-test result
        if: steps.wheel.outputs.status != '0'
        run: exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-py${{ matrix.python-version }}
          path: dist/*

  container-security:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          show-progress: false

      - name: Build container image
        run: docker build -t ghostmcp:ci -f deploy/container/Dockerfile .

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ghostmcp:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
