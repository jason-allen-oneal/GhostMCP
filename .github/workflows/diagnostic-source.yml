name: Diagnostic Source Snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'fix/security-hardening-beta'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          show-progress: false

      - name: Upload source snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghostmcp-source
          include-hidden-files: true
          path: |
            .env.example
            .github
            deploy
            ghostmcp
            pyproject.toml
            README.md
            requirements*.txt
            tests
