{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Schedules for {{ engagement.name }}</h2>
        <a href="/engagements/{{ engagement.id }}/schedule" class="px-4 py-2 bg-purple-600 text-white rounded">New schedule</a>
    </div>
    <div class="space-y-3">
        {% for schedule in schedules %}
            {% include "schedule/row.html" %}
        {% else %}
            <p class="text-gray-500">No recurring scans configured.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
