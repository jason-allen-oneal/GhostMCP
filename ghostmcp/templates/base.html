<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GhostMCP Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; }
        .severity-critical { @apply bg-red-100 text-red-800; }
        .severity-high { @apply bg-orange-100 text-orange-800; }
        .severity-medium { @apply bg-yellow-100 text-yellow-800; }
        .severity-low { @apply bg-green-100 text-green-800; }
        .severity-info { @apply bg-blue-100 text-blue-800; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gray-900 text-white p-4 shadow">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">GhostMCP Dashboard</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-gray-300">Dashboard</a>
                <a href="/engagements" class="hover:text-gray-300">Engagements</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
