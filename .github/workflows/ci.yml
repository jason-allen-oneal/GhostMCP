name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Generate dev lock file
        run: pip-compile --generate-hashes --output-file=requirements-dev.lock.txt pyproject.toml --extra dev

      - name: Generate release lock file
        run: pip-compile --generate-hashes --output-file=requirements-release.lock.txt pyproject.toml

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-dev.lock.txt
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy ghostmcp

      - name: Security static scan (bandit)
        run: bandit -q -r ghostmcp

      - name: Dependency audit (pip-audit)
        run: pip-audit

      - name: Unit and integration tests
        run: python -m unittest discover -s tests

      - name: Build package artifacts
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-py${{ matrix.python-version }}
          path: dist/*

  container-security:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Build container image
        run: docker build -t ghostmcp:ci -f deploy/container/Dockerfile .

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ghostmcp:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
