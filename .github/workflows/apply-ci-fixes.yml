name: Apply Verified CI Fixes

on:
  push:
    branches:
      - fix/security-hardening-beta

permissions:
  contents: write

jobs:
  apply:
    # One-shot branch maintenance job. Removed after the verified patch is applied.
    if: ${{ hashFiles('.ci/ci-fixes.patch') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          ref: fix/security-hardening-beta
          show-progress: false

      - name: Apply verified patch
        run: |
          git apply --check .ci/ci-fixes.patch
          git apply .ci/ci-fixes.patch
          rm .ci/ci-fixes.patch
          rmdir .ci 2>/dev/null || true

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve CI findings and centralize URL scope"
          git push origin HEAD:fix/security-hardening-beta
