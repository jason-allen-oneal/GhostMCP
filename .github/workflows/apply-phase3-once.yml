name: Apply Phase 3 Once

on:
  push:
    branches:
      - fix/security-hardening-beta

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          ref: fix/security-hardening-beta
          show-progress: false

      - name: Apply locally verified patch
        shell: bash
        env:
          PATCH_GZ_B64: 
        run: |
          printf '%s' "$PATCH_GZ_B64" | base64 -d | gzip -d > /tmp/phase3.patch
          git apply --check /tmp/phase3.patch
          git apply /tmp/phase3.patch

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add guarded workflows and executable scheduling"
          git push origin HEAD:fix/security-hardening-beta
