name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lint and lock tooling
        run: python -m pip install ruff pip-tools

      - name: Lint
        run: ruff check . --output-format=concise

      - name: Generate development lock file
        run: >-
          pip-compile --generate-hashes
          --output-file=requirements-dev.lock.txt
          pyproject.toml --extra dev --extra dashboard --extra credentials

      - name: Generate runtime lock file
        run: >-
          pip-compile --generate-hashes
          --output-file=requirements.lock.txt
          pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock.txt
          python -m pip install -e . --no-deps

      - name: Type check
        run: mypy ghostmcp

      - name: Security static scan
        run: bandit -q -r ghostmcp

      - name: Dependency audit
        run: pip-audit

      - name: Unit and integration tests
        run: python -m unittest discover -s tests -v

      - name: Build package artifacts
        run: python -m build

      - name: Verify built wheel in a clean environment
        run: |
          python -m venv /tmp/ghostmcp-wheel-smoke
          /tmp/ghostmcp-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/ghostmcp-wheel-smoke/bin/python -m pip install dist/*.whl jinja2 python-multipart cryptography
          /tmp/ghostmcp-wheel-smoke/bin/python - <<'PY'
          from importlib.resources import files
          import ghostmcp.parsers.nmap
          import ghostmcp.dashboard
          assert files("ghostmcp").joinpath("templates/dashboard.html").is_file()
          PY
          /tmp/ghostmcp-wheel-smoke/bin/ghostmcp --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-py${{ matrix.python-version }}
          path: dist/*

  container-security:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Build container image
        run: docker build -t ghostmcp:ci -f deploy/container/Dockerfile .

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ghostmcp:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
