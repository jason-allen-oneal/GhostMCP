name: Refresh Locks Once

on:
  push:
    branches:
      - fix/security-hardening-beta

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          ref: fix/security-hardening-beta
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.11"

      - name: Regenerate locks
        run: |
          python -m pip install "setuptools>=83" pip-tools
          pip-compile --generate-hashes --allow-unsafe \
            --output-file=requirements-dev.lock.txt \
            pyproject.toml --extra dev --extra dashboard --extra credentials
          pip-compile --generate-hashes --allow-unsafe \
            --output-file=requirements.lock.txt \
            pyproject.toml
          pip-compile --generate-hashes --allow-unsafe \
            --output-file=requirements-release.lock.txt \
            pyproject.toml --extra release

      - name: Commit refreshed locks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements-dev.lock.txt requirements.lock.txt requirements-release.lock.txt
          git diff --cached --quiet && exit 0
          git commit -m "deps: refresh patched lock files"
          git push origin HEAD:fix/security-hardening-beta
